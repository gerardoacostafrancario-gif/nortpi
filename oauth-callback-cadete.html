<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Puerta a Puerta — Conectando MercadoPago</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,sans-serif;}
body{background:#0D0D0D;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#111;border-radius:20px;padding:40px 30px;max-width:400px;width:100%;text-align:center;border:1px solid #1a1a1a;}
.logo{width:56px;height:56px;border-radius:14px;background:#FF6B35;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.title{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;}
.sub{font-size:13px;color:#aaa;line-height:1.6;margin-bottom:24px;}
.spinner{width:36px;height:36px;border:3px solid #333;border-top:3px solid #FF6B35;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.success{font-size:48px;margin-bottom:12px;}
.btn{display:inline-block;background:#FF6B35;color:#fff;border:none;border-radius:12px;padding:12px 28px;font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;margin-top:16px;}
.error-box{background:#3D0D0D;color:#FF5252;border-radius:10px;padding:12px;font-size:13px;margin-top:12px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="32" height="32" viewBox="0 0 90 90" fill="none">
      <path d="M10 36 L45 18 L80 36" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="12" y="36" width="30" height="46" rx="4" fill="#fff" opacity=".9"/>
      <rect x="48" y="36" width="30" height="46" rx="4" fill="#fff"/>
    </svg>
  </div>
  <div id="estado-cargando">
    <div class="spinner"></div>
    <div class="title">Conectando MercadoPago</div>
    <div class="sub">Vinculando tu cuenta de cadete...</div>
  </div>
  <div id="estado-exito" style="display:none;">
    <div class="success">✅</div>
    <div class="title" style="color:#fff;">¡MercadoPago conectado!</div>
    <div class="sub">El 75% de cada viaje llega directo a tu cuenta de MercadoPago automáticamente.</div>
    <a class="btn" href="/cadete.html">Ir a mi panel →</a>
  </div>
  <div id="estado-error" style="display:none;">
    <div class="success">❌</div>
    <div class="title" style="color:#fff;">Error al conectar</div>
    <div class="error-box" id="error-msg">Hubo un problema.</div>
    <a class="btn" href="/cadete.html">Volver al panel</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SU='https://fmqlpgerqdiplnvjjarl.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtcWxwZ2VycWRpcGxudmpqYXJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MTkwNTYsImV4cCI6MjA5MDQ5NTA1Nn0.r1X4NSX8t-v9EeJQ-eK9DVslIWkpo2_UCn-oRy6k--w';
const sb = supabase.createClient(SU, SK);

async function procesarOAuth() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error || !code) {
    mostrarError('No se recibió autorización de MercadoPago.');
    return;
  }

  try {
    const resp = await fetch('/api/oauth-token-cadete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });

    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Error al obtener token');

    // Guardar en tabla cadetes
    const {data:{session}} = await sb.auth.getSession();
    if(session){
      await sb.from('cadetes').update({
        mp_access_token: data.access_token,
        mp_user_id: String(data.user_id),
        mp_conectado: true
      }).eq('email', session.user.email);
    }

    mostrarExito();
  } catch(e) {
    mostrarError(e.message);
  }
}

function mostrarExito() {
  document.getElementById('estado-cargando').style.display='none';
  document.getElementById('estado-exito').style.display='block';
}
function mostrarError(msg) {
  document.getElementById('estado-cargando').style.display='none';
  document.getElementById('estado-error').style.display='block';
  document.getElementById('error-msg').textContent=msg;
}

procesarOAuth();
</script>
</body>
</html>
